        shell: bash
      - name: Download Node.js (Windows x86)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries/node-win-x86
          curl -fsSL https://nodejs.org/dist/v22.12.0/win-x86/node.exe -o src-tauri/binaries/node-win-x86/node.exe
      - name: Compile server TS → JS (for Node.js)
        shell: bash
        run: |
          npx esbuild server/src/server.ts --bundle --platform=node --outfile=server/dist/server.mjs --format=esm --external:ws --external:strip-ansi
      - name: Copy x86 Tauri config
        shell: bash
        run: cp src-tauri/tauri.windows-x86.conf.json src-tauri/tauri.windows.conf.json

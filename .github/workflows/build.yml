name: Build Deep Desk

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-apple-darwin" }
      - name: Install dependencies
        run: bun install && cd web && bun install
      - name: Build frontend
        run: cd web && bun run build
      - name: Download Bun (macOS arm64)
        run: |
          mkdir -p src-tauri/binaries/bun-darwin-aarch64
          curl -fsSL https://github.com/oven-sh/bun/releases/latest/download/bun-darwin-aarch64.zip -o /tmp/b.zip
          unzip -o /tmp/b.zip -d /tmp/bun-mac/
          mv /tmp/bun-mac/bun-darwin-aarch64/bun src-tauri/binaries/bun-darwin-aarch64/bun
          chmod +x src-tauri/binaries/bun-darwin-aarch64/bun
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          args: --target aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: Deep-Desk-macOS-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        shell: bash
        run: bun install && cd web && bun install
      - name: Build frontend
        run: cd web && bun run build
        shell: bash
      - name: Download Bun (Windows x64)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries/bun-windows-x64
          curl -fsSL https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64.zip -o /tmp/b.zip
          unzip -o /tmp/b.zip -d /tmp/bun-win/
          mv /tmp/bun-win/bun-windows-x64/bun.exe src-tauri/binaries/bun-windows-x64/bun.exe
      - name: Bundle Git Bash (from CI runner)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries/git
          cp -r "C:/Program Files/Git/"* src-tauri/binaries/git/
          # Keep only what bash/git need: bin, cmd, usr/bin, mingw64/bin, etc/ (for gitconfig)
          rm -rf src-tauri/binaries/git/share
          rm -rf src-tauri/binaries/git/lib
          rm -rf src-tauri/binaries/git/libexec
          rm -rf src-tauri/binaries/git/doc
          rm -rf src-tauri/binaries/git/locale
          rm -rf src-tauri/binaries/git/ssl
          rm -rf src-tauri/binaries/git/tmp
          rm -f src-tauri/binaries/git/.gitignore src-tauri/binaries/git/README* src-tauri/binaries/git/LICENSE*
          ls src-tauri/binaries/git/usr/bin/bash.exe && echo "bash OK"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          args: --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: Deep-Desk-Windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig

  release:
    needs: [macos-aarch64, windows-x64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY }}
          OSS_SECRET_KEY: ${{ secrets.OSS_SECRET_KEY }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          mkdir -p ~/.local/bin
          curl -fsSL "https://gosspublic.alicdn.com/ossutil/ossutil-linux-amd64.zip" -o /tmp/ossutil.zip
          unzip -o /tmp/ossutil.zip -d /tmp/ossutil-extract
          find /tmp/ossutil-extract -name ossutil64 -exec cp {} ~/.local/bin/ossutil \;
          chmod +x ~/.local/bin/ossutil
          ~/.local/bin/ossutil config --access-key-id "$OSS_ACCESS_KEY" --access-key-secret "$OSS_SECRET_KEY" --endpoint oss-cn-hangzhou.aliyuncs.com
          DMG=$(find artifacts/Deep-Desk-macOS-arm64 -name "*.dmg" | head -1)
          [ -n "$DMG" ] && ~/.local/bin/ossutil cp "$DMG" oss://ccb-store/deepdesk/Deep-Desk-latest.dmg -f
          EXE=$(find artifacts/Deep-Desk-Windows-x64 -name "*.exe" | head -1)
          MSI=$(find artifacts/Deep-Desk-Windows-x64 -name "*.msi" | head -1)
          WIN_FILE=""
          [ -n "$MSI" ] && WIN_FILE="$MSI"
          [ -z "$WIN_FILE" ] && [ -n "$EXE" ] && WIN_FILE="$EXE"
          if [ -n "$WIN_FILE" ]; then
            EXT="${WIN_FILE##*.}"
            ~/.local/bin/ossutil cp "$WIN_FILE" "oss://ccb-store/deepdesk/Deep-Desk-setup.${EXT}" -f
            # Upload Windows .sig for Tauri updater
            WIN_SIG=$(find artifacts/Deep-Desk-Windows-x64 -name "*.${EXT}.sig" | head -1)
            if [ -n "$WIN_SIG" ]; then
              ~/.local/bin/ossutil cp "$WIN_SIG" "oss://ccb-store/deepdesk/Deep-Desk-${VERSION}_x64.${EXT}.sig" -f
            fi
            echo "{\"version\":\"$VERSION\",\"macUrl\":\"https://ccb-store.oss-cn-hangzhou.aliyuncs.com/deepdesk/Deep-Desk-latest.dmg\",\"winUrl\":\"https://ccb-store.oss-cn-hangzhou.aliyuncs.com/deepdesk/Deep-Desk-setup.${EXT}\"}" > v.json
          else
            echo "{\"version\":\"$VERSION\",\"macUrl\":\"https://ccb-store.oss-cn-hangzhou.aliyuncs.com/deepdesk/Deep-Desk-latest.dmg\",\"winUrl\":\"\"}" > v.json
          fi
          ~/.local/bin/ossutil cp v.json oss://ccb-store/deepdesk/version.json -f
          # Auto-update: upload versioned mac app.tar.gz + .sig
          MAC_TGZ=$(find artifacts/Deep-Desk-macOS-arm64 -name "*.app.tar.gz" 2>/dev/null | head -1)
          MAC_SIG=$(find artifacts/Deep-Desk-macOS-arm64 -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$MAC_TGZ" ] && [ -n "$MAC_SIG" ]; then
            ~/.local/bin/ossutil cp "$MAC_TGZ" "oss://ccb-store/deepdesk/Deep-Desk-${VERSION}_aarch64.app.tar.gz" -f
            MAC_SIG_CONTENT=$(cat "$MAC_SIG")
            # Build latest.json with available platforms
            echo -n "{\"version\":\"$VERSION\",\"notes\":\"Auto-update to v$VERSION\",\"pub_date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"platforms\":{" > /tmp/latest.json
            echo -n "\"darwin-aarch64\":{\"signature\":\"$MAC_SIG_CONTENT\",\"url\":\"https://ccb-store.oss-cn-hangzhou.aliyuncs.com/deepdesk/Deep-Desk-${VERSION}_aarch64.app.tar.gz\"}" >> /tmp/latest.json
            WIN_SIG=$(find artifacts/Deep-Desk-Windows-x64 -name "*.sig" 2>/dev/null | head -1)
            WIN_INSTALLER=$(find artifacts/Deep-Desk-Windows-x64 \( -name "*.msi" -o -name "*.exe" \) 2>/dev/null | head -1)
            if [ -n "$WIN_SIG" ] && [ -n "$WIN_INSTALLER" ]; then
              W_EXT="${WIN_INSTALLER##*.}"
              WIN_SIG_CONTENT=$(cat "$WIN_SIG")
              echo -n ",\"windows-x86_64\":{\"signature\":\"$WIN_SIG_CONTENT\",\"url\":\"https://ccb-store.oss-cn-hangzhou.aliyuncs.com/deepdesk/Deep-Desk-${VERSION}_x64.${W_EXT}\"}" >> /tmp/latest.json
              ~/.local/bin/ossutil cp "$WIN_INSTALLER" "oss://ccb-store/deepdesk/Deep-Desk-${VERSION}_x64.${W_EXT}" -f
            fi
            echo "}}" >> /tmp/latest.json
            ~/.local/bin/ossutil cp /tmp/latest.json oss://ccb-store/deepdesk/latest.json -f
            echo "  ✓ latest.json updated"
          fi

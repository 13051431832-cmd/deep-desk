name: Build Deep Desk

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-apple-darwin" }
      - name: Install dependencies
        run: bun install && cd web && bun install
      - name: Build frontend
        run: cd web && bun run build
      - name: Download Bun (macOS arm64)
        run: |
          mkdir -p src-tauri/binaries/bun-darwin-aarch64
          curl -fsSL https://github.com/oven-sh/bun/releases/latest/download/bun-darwin-aarch64.zip -o /tmp/b.zip
          unzip -o /tmp/b.zip -d /tmp/bun-mac/
          mv /tmp/bun-mac/bun-darwin-aarch64/bun src-tauri/binaries/bun-darwin-aarch64/bun
          chmod +x src-tauri/binaries/bun-darwin-aarch64/bun
      - name: Verify Apple certificate
        run: |
          echo "Base64 length: $(echo "$APPLE_CERTIFICATE" | wc -c)"
          echo "Base64 lines: $(echo "$APPLE_CERTIFICATE" | wc -l)"
          echo "$APPLE_CERTIFICATE" | base64 -d -o /tmp/cert.p12 2>&1 || echo "base64 decode failed"
          ls -la /tmp/cert.p12 2>/dev/null || echo "cert file missing"
          file /tmp/cert.p12 2>/dev/null || true
          echo "Password length: ${#APPLE_CERTIFICATE_PASSWORD}"
          security create-keychain -p temp /tmp/test.keychain
          security unlock-keychain -p temp /tmp/test.keychain
          security import /tmp/cert.p12 -k /tmp/test.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign 2>&1
          echo "Exit code: $?"
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      - name: Write Apple API key to file
        run: echo "$APPLE_API_KEY" > /tmp/apple-api-key.p8
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin
      - name: Notarize and staple DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          DMG=$(find src-tauri/target -name "*.dmg" | head -1)
          echo "DMG: $DMG"
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG" \
            --key /tmp/apple-api-key.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --no-wait 2>&1)
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -o 'id: [a-f0-9-]*' | head -1 | cut -d' ' -f2)
          echo "Submission ID: $SUBMISSION_ID"
          for i in $(seq 1 36); do
            echo "=== Notarization poll $i/36 at $(date) ==="
            if xcrun notarytool wait "$SUBMISSION_ID" \
              --key /tmp/apple-api-key.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --timeout 5m 2>&1; then
              echo "Notarization accepted!"
              break
            fi
            echo "Poll $i done, retrying in 30s..."
            sleep 30
          done
          xcrun notarytool log "$SUBMISSION_ID" \
            --key /tmp/apple-api-key.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" || true
          xcrun stapler staple "$DMG" || true
          echo "Staple exit: $?"
      - uses: actions/upload-artifact@v4
        with:
          name: Deep-Desk-macOS-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

